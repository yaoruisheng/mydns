name: Build Mosdns Domain Lists
permissions:
  contents: write
on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget

      - name: Download geosite.dat
        run: |
          wget -O geosite.dat https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geosite.dat

      - name: Download mosdns
        run: |
          wget -O mosdns.zip https://github.com/IrineSistiana/mosdns/releases/download/v4.5.3/mosdns-linux-amd64.zip
          unzip mosdns.zip
          chmod +x mosdns

      - name: Prepare output directory
        run: |
          mkdir -p output

      - name: Extract domain lists
        run: |
          # 基础分类
          ./mosdns v2dat unpack-domain -o ./output geosite.dat:cn
          ./mosdns v2dat unpack-domain -o ./output geosite.dat:geolocation-!cn
          ./mosdns v2dat unpack-domain -o ./output geosite.dat:category-ads-all

          # 特殊 dnsmasq-china-list 类
          ./mosdns v2dat unpack-domain -o ./output geosite.dat:china-list
          ./mosdns v2dat unpack-domain -o ./output geosite.dat:apple-cn
          ./mosdns v2dat unpack-domain -o ./output geosite.dat:google-cn

      - name: Show output files
        run: |
          ls -lah output

      - name: Generate tag
        run: |
          echo "TAG_NAME=geosite-$(date +%Y%m%d%H%M%S)-${GITHUB_RUN_ID}" >> $GITHUB_ENV

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          files: |
            output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
